name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    name: shellcheck + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax check
        run: |
          for f in $(git ls-files '*.sh'); do
            echo "bash -n $f"; bash -n "$f"
          done
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          # SC1090/SC1091: sourced paths resolved at runtime; SC2016: intentional literal $ in embeds
          shellcheck -e SC1090,SC1091,SC2016 $(git ls-files '*.sh') || true
